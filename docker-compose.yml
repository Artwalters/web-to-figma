services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: web-to-figma:local
    container_name: web-to-figma
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - BACKEND_API_KEY=${BACKEND_API_KEY}
      - NODE_ENV=production
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
